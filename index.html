<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jun的个人主页</title>
    <style>
        /* 1. 定义颜色变量 (CSS Variables) */
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #64748b;
            --accent-color: #3b82f6;
            --highlight-bg: #dbeafe;
            --border-color: #e2e8f0;
            --btn-hover: #1d4ed8;
        }

        /* 2. 暗黑模式下的变量覆盖 */
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --accent-color: #60a5fa;
            --highlight-bg: #1e3a8a;
            --border-color: #334155;
            --btn-hover: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text-main);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background: var(--card-bg);
            width: 90%;
            max-width: 650px;
            padding: 40px;
            margin: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 8px solid var(--accent-color);
            position: relative; /* 为切换按钮定位 */
            transition: background-color 0.3s ease;
        }

        /* 暗黑模式切换按钮样式 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        h1 { color: var(--accent-color); font-size: 2.2em; margin-bottom: 5px; }
        .subtitle { color: var(--text-sub); font-style: italic; margin-bottom: 30px; }
        .section { margin-bottom: 25px; }
        h2 { border-bottom: 2px solid var(--border-color); padding-bottom: 8px; color: var(--text-main); }
        
        .repo-card { border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; margin-bottom: 12px; }
        .repo-link { font-weight: bold; color: var(--accent-color); text-decoration: none; }
        
        .highlight { background-color: var(--highlight-bg); color: var(--accent-color); padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        
        .msg-form { display: flex; flex-direction: column; gap: 10px; background: var(--bg-color); padding: 15px; border-radius: 10px; }
        input, textarea { background: var(--card-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; }
        button#send-btn { background: var(--accent-color); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button#send-btn:hover { background: var(--btn-hover); }

        .msg-item { border-bottom: 1px dashed var(--border-color); padding: 10px 0; font-size: 0.9em; }
        .msg-name { font-weight: bold; color: var(--accent-color); }
        .msg-time { font-size: 0.8em; color: var(--text-sub); margin-left: 10px; }
        footer { margin-top: 30px; text-align: center; font-size: 0.8em; color: var(--text-sub); }
    </style>
</head>
<body>

    <div class="container">
        <button class="theme-toggle" id="theme-btn" title="切换主题">
            <span id="theme-icon">🌙</span>
        </button>

        <header>
            <h1>Hello, my name is jun!</h1>
            <p class="subtitle">"My Python and CS journey starts here."</p>
        </header>

        <main>
            <div class="section">
                <p>📊 跳转统计：<span id="click-total" class="highlight">...</span> 次</p>
                <h2>GitHub 仓库</h2>
                <div class="repo-card">
                    <a href="https://go.junjohnny.me/git" target="_blank" class="repo-link">📦 Python_Algorithms</a>
                    <p style="font-size: 0.9em;">算法与数据结构练习。</p>
                </div>
            </div>

            <div class="section">
                <h2>留言板 (Guestbook)</h2>
                <div class="msg-form">
                    <input type="text" id="u-name" placeholder="名字">
                    <textarea id="u-content" placeholder="留言内容..." rows="2"></textarea>
                    <button id="send-btn" onclick="postMessage()">发送留言</button>
                </div>
                <div id="msg-display" style="margin-top: 15px; max-height: 200px; overflow-y: auto;">加载留言中...</div>
            </div>
        </main>

        <footer>© 2026 Jun Johnny | Powered by Cloudflare Workers</footer>
    </div>

    <script>
        // --- A. 暗黑模式逻辑 ---
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');
        const currentTheme = localStorage.getItem('theme') || 'light';

        // 初始化主题
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeIcon.innerText = '☀️';
        }

        themeBtn.addEventListener('click', () => {
            let theme = document.documentElement.getAttribute('data-theme');
            if (theme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerText = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.innerText = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        });

        // --- B. 原有留言板逻辑 (保持不变) ---
        const API = "https://go.junjohnny.me/api/messages";

        async function loadData() {
            try {
                const res = await fetch(API);
                const data = await res.json();
                document.getElementById('click-total').innerText = data.clicks;
                const list = document.getElementById('msg-display');
                list.innerHTML = data.messages.reverse().map(m => `
                    <div class="msg-item">
                        <span class="msg-name">${m.name}</span><span class="msg-time">${m.time}</span>
                        <p style="margin: 5px 0 0 0;">${m.content}</p>
                    </div>
                `).join('') || "暂无留言";
            } catch (e) { console.error(e); }
        }

        async function postMessage() {
            const name = document.getElementById('u-name').value;
            const content = document.getElementById('u-content').value;
            if(!name || !content) return alert("请填写完整");
            try {
                const res = await fetch(API, {
                    method: 'POST',
                    body: JSON.stringify({ name, content })
                });
                const result = await res.json();
                if(result.error) alert(result.error);
                else { document.getElementById('u-content').value = ""; loadData(); }
            } catch (e) { alert("提交失败"); }
        }

        window.onload = loadData;
    </script>
</body>
</html>

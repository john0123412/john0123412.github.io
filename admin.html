<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jun Johnny - 管理面板</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 20px; }
        .card { background: white; max-width: 600px; margin: 20px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, button { padding: 12px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }
        .msg-item { background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .btn-del { background: #ef4444; width: auto; padding: 6px 12px; font-size: 12px; margin: 0; }
        .btn-clear { background: #0f172a; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-section">
        <h2 style="text-align: center;">🔐 管理员登录</h2>
        <input type="password" id="pw-input" placeholder="输入原始管理密码">
        <button onclick="handleLogin()">进入管理系统</button>
    </div>

    <div id="admin-section" class="hidden">
        <h2>留言管理</h2>
        <div id="msg-container">加载中...</div>
        <button class="btn-clear" onclick="runAction('clear_all')">清空所有数据 (慎用)</button>
    </div>
</div>

<script>
    const API_BASE = "https://go.junjohnny.me/api/messages";
    const ADMIN_API = "https://go.junjohnny.me/api/admin/manage";
    let hashedPw = "";

    // 【核心】SubtleCrypto SHA-256 加密函数
    async function calcHash(text) {
        const msgUint8 = new TextEncoder().encode(text);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function handleLogin() {
        const raw = document.getElementById('pw-input').value;
        if(!raw) return alert("请输入密码");
        hashedPw = await calcHash(raw);
        refreshList();
    }

    async function refreshList() {
        try {
            const res = await fetch(API_BASE);
            const data = await res.json();
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            
            const container = document.getElementById('msg-container');
            container.innerHTML = data.messages.map((m, i) => `
                <div class="msg-item">
                    <span><strong>${m.name}</strong>: ${m.content}</span>
                    <button class="btn-del" onclick="runAction('delete', ${i})">删除</button>
                </div>
            `).join('') || "当前无留言";
        } catch(e) { alert("登录失败或网络错误"); }
    }

    async function runAction(action, index = null) {
        if(!confirm(`确定执行: ${action}？`)) return;

        const res = await fetch(ADMIN_API, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Admin-Token': hashedPw
            },
            body: JSON.stringify({ action, index })
        });

        const result = await res.json();
        if(result.success) {
            alert(result.success);
            refreshList();
        } else {
            alert("操作失败: " + result.error);
        }
    }
</script>
</body>
</html>

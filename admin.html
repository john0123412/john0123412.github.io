<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jun Johnny - Admin Panel</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        input, button { width: 100%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: #fff; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #333; }
        .hidden { display: none; }
        .log-box { background: #000; border: 1px dashed #333; padding: 10px; max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .log-item { border-bottom: 1px solid #222; padding: 5px 0; font-size: 12px; }
        .ip { color: #f0f; } .time { color: #ff0; }
        .msg-item { background: #222; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .del-btn { width: auto; background: #f00; border: none; padding: 5px 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-view">
        <h2>🔒 SYSTEM ACCESS</h2>
        <input type="password" id="pw" placeholder="Enter Password">
        <button onclick="login()">AUTHENTICATE</button>
    </div>

    <div id="admin-view" class="hidden">
        <h2>📊 TRAFFIC MONITOR</h2>
        <button onclick="loadStats()">REFRESH LOGS</button>
        <div id="traffic-log" class="log-box">Waiting for data...</div>

        <h2>📝 MESSAGE CONTROL</h2>
        <div id="msg-list">Loading...</div>
        <button onclick="clearAll()" style="background: #500; margin-top:20px;">⚠ PURGE ALL DATA</button>
    </div>
</div>

<script>
    const API_MSG = "https://go.junjohnny.me/api/messages";
    const API_STATS = "https://go.junjohnny.me/api/admin/stats";
    const API_MANAGE = "https://go.junjohnny.me/api/admin/manage";
    let token = "";

    async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function login() {
        const pw = document.getElementById('pw').value;
        if(!pw) return;
        token = await sha256(pw);
        loadMsgs();
        loadStats();
    }

    async function loadStats() {
        try {
            const res = await fetch(API_STATS, { headers: { 'X-Admin-Token': token } });
            if(res.status === 401) return alert("Wrong Password");
            const data = await res.json();
            
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');

            let html = `<div>DATE: ${data.date} | TODAY: ${data.today} | TOTAL: ${data.total}</div><br>`;
            html += data.logs.map(l => `
                <div class="log-item">
                    <span class="time">[${l.time.split(' ')[1]}]</span> 
                    <span class="ip">IP: ${l.ip}</span>
                </div>
            `).join('');
            document.getElementById('traffic-log').innerHTML = html;
        } catch(e) { console.error(e); }
    }

    async function loadMsgs() {
        const res = await fetch(API_MSG);
        const data = await res.json();
        document.getElementById('msg-list').innerHTML = data.messages.map((m, i) => `
            <div class="msg-item">
                <span>${m.name}: ${m.content}</span>
                <button class="del-btn" onclick="del(${i})">DEL</button>
            </div>
        `).join('');
    }

    async function del(index) {
        if(!confirm("Delete?")) return;
        await fetch(API_MANAGE, { 
            method: 'POST', 
            headers: { 'X-Admin-Token': token },
            body: JSON.stringify({ action: 'delete', index }) 
        });
        loadMsgs();
    }
    
    async function clearAll() {
        if(!confirm("DELETE EVERYTHING?")) return;
        await fetch(API_MANAGE, { 
            method: 'POST', 
            headers: { 'X-Admin-Token': token },
            body: JSON.stringify({ action: 'clear_all' }) 
        });
        loadMsgs(); loadStats();
    }
</script>
</body>
</html>
